<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书借阅管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ==================== 登录页面 ==================== -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-box">
                <h1>📚 图书借阅管理系统</h1>
                
                <!-- 表单标签：form的onsubmit事件 -->
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="form-group">
                        <label for="loginAccountId">账号（12位数字）</label>
                        <!-- input标签：type/id/maxlength/pattern/placeholder属性 -->
                        <input type="text" id="loginAccountId" maxlength="12" pattern="\d{12}" placeholder="请输入12位账号" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    </div>
                    <!-- button标签 -->
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
                
                <p class="link-text">
                    <!-- a标签：href属性，onclick事件 -->
                    <a href="#" onclick="showRegisterForm()">没有账号？点击注册</a>
                </p>
                
                <!-- 注册表单（默认隐藏） -->
                <form id="registerForm" class="hidden" onsubmit="return handleRegister(event)">
                    <h2>用户注册</h2>
                    <div class="form-group">
                        <label for="regAccountId">账号（12位数字）</label>
                        <input type="text" id="regAccountId" maxlength="12" pattern="\d{12}" placeholder="请输入12位账号" required>
                    </div>
                    <div class="form-group">
                        <label for="regUsername">用户名</label>
                        <input type="text" id="regUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">密码</label>
                        <input type="password" id="regPassword" placeholder="请输入密码" required>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">手机号（11位）</label>
                        <input type="tel" id="regPhone" maxlength="11" pattern="\d{11}" placeholder="请输入11位手机号" required>
                    </div>
                    <button type="submit" class="btn btn-primary">注册</button>
                    <p class="link-text">
                        <a href="#" onclick="showLoginForm()">已有账号？返回登录</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- ==================== 主页面 ==================== -->
    <div id="mainPage" class="page">
        <!-- 顶部导航栏 -->
        <div class="header">
            <h1>📚 图书借阅管理系统</h1>
            <div class="header-right">
                <span id="welcomeText">欢迎，用户</span>
                <button class="btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <!-- 主体内容：使用float布局 -->
        <div class="main-wrapper">
            <!-- 左侧导航菜单 -->
            <div class="sidebar">
                <ul class="nav-menu">
                    <li class="nav-item active" onclick="switchTab('books')">📖 图书查询</li>
                    <li class="nav-item" onclick="switchTab('borrow')">📋 我的借阅</li>
                    <li class="nav-item" onclick="switchTab('profile')">👤 个人中心</li>
                    <li class="nav-item admin-only" onclick="switchTab('bookManage')">📚 图书管理</li>
                    <li class="nav-item admin-only" onclick="switchTab('userManage')">👥 用户管理</li>
                </ul>
            </div>

            <!-- 右侧内容区 -->
            <div class="content">
                <!-- ========== 图书查询页 ========== -->
                <div id="booksTab" class="tab-content active">
                    <h2>图书查询</h2>
                    <div class="search-box">
                        <input type="text" id="searchKeyword" placeholder="输入书名或作者搜索...">
                        <select id="categorySelect">
                            <option value="">全部分类</option>
                        </select>
                        <button class="btn btn-primary" onclick="searchBooks()">搜索</button>
                    </div>
                    
                    <!-- table标签：表格布局 -->
                    <table class="data-table" id="booksTable">
                        <thead>
                            <tr>
                                <th>书名</th>
                                <th>作者</th>
                                <th>分类</th>
                                <th>出版社</th>
                                <th>可借/总数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>

                <!-- ========== 我的借阅页 ========== -->
                <div id="borrowTab" class="tab-content">
                    <h2>我的借阅</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>书名</th>
                                <th>借阅日期</th>
                                <th>到期日期</th>
                                <th>归还日期</th>
                                <th>状态</th>
                                <th>罚款</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="borrowTableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>

                <!-- ========== 个人中心页 ========== -->
                <div id="profileTab" class="tab-content">
                    <h2>个人中心</h2>
                    <div class="profile-section">
                        <h3>基本信息</h3>
                        <form id="profileForm" onsubmit="return updateProfile(event)">
                            <table class="form-table">
                                <tr>
                                    <td><label>账号：</label></td>
                                    <td><input type="text" id="profileAccountId" readonly></td>
                                </tr>
                                <tr>
                                    <td><label>用户名：</label></td>
                                    <td><input type="text" id="profileUsername" readonly></td>
                                </tr>
                                <tr>
                                    <td><label>手机号：</label></td>
                                    <td><input type="tel" id="profilePhone" maxlength="11"></td>
                                </tr>
                                <tr>
                                    <td><label>邮箱：</label></td>
                                    <td><input type="email" id="profileEmail"></td>
                                </tr>
                                <tr>
                                    <td><label>地址：</label></td>
                                    <td><input type="text" id="profileAddress"></td>
                                </tr>
                                <tr>
                                    <td></td>
                                    <td><button type="submit" class="btn btn-primary">保存修改</button></td>
                                </tr>
                            </table>
                        </form>
                    </div>
                    
                    <div class="profile-section">
                        <h3>修改密码</h3>
                        <form id="passwordForm" onsubmit="return updatePassword(event)">
                            <table class="form-table">
                                <tr>
                                    <td><label>原密码：</label></td>
                                    <td><input type="password" id="oldPassword" required></td>
                                </tr>
                                <tr>
                                    <td><label>新密码：</label></td>
                                    <td><input type="password" id="newPassword" required></td>
                                </tr>
                                <tr>
                                    <td><label>确认密码：</label></td>
                                    <td><input type="password" id="confirmPassword" required></td>
                                </tr>
                                <tr>
                                    <td></td>
                                    <td><button type="submit" class="btn btn-primary">修改密码</button></td>
                                </tr>
                            </table>
                        </form>
                    </div>
                </div>

                <!-- ========== 图书管理页（管理员） ========== -->
                <div id="bookManageTab" class="tab-content">
                    <h2>图书管理</h2>
                    <button class="btn btn-primary" onclick="showAddBookForm()">+ 添加图书</button>
                    
                    <!-- 添加图书表单（默认隐藏） -->
                    <div id="addBookForm" class="form-panel hidden">
                        <h3 id="bookFormTitle">添加图书</h3>
                        <form onsubmit="return saveBook(event)">
                            <input type="hidden" id="editBookId">
                            <table class="form-table">
                                <tr>
                                    <td><label>书名：</label></td>
                                    <td><input type="text" id="bookTitle" required></td>
                                    <td><label>作者：</label></td>
                                    <td><input type="text" id="bookAuthor"></td>
                                </tr>
                                <tr>
                                    <td><label>ISBN：</label></td>
                                    <td><input type="text" id="bookIsbn"></td>
                                    <td><label>分类：</label></td>
                                    <td><select id="bookCategory"></select></td>
                                </tr>
                                <tr>
                                    <td><label>出版社：</label></td>
                                    <td><input type="text" id="bookPublisher"></td>
                                    <td><label>出版日期：</label></td>
                                    <td><input type="date" id="bookPublishDate"></td>
                                </tr>
                                <tr>
                                    <td><label>总册数：</label></td>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="newPassword" required>
                            </div>
                            <div class="form-group">
                                <label>确认新密码</label>
                                <input type="password" id="confirmNewPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary">修改密码</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 图书管理页（管理员） -->
            <div id="bookManagePage" class="content-page">
                <div class="page-header">
                    <h2>图书管理</h2>
                    <button class="btn btn-primary" onclick="showAddBookModal()">添加图书</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>ISBN</th>
                                <th>分类</th>
                                <th>库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="bookManageTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 用户管理页（管理员） -->
            <div id="userManagePage" class="content-page">
                <div class="page-header">
                    <h2>用户管理</h2>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>账号</th>
                                <th>用户名</th>
                                <th>手机号</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userManageTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑图书弹窗 -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBookModal()">&times;</span>
            <h2 id="bookModalTitle">添加图书</h2>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="form-row">
                    <div class="form-group">
                        <label>书名 *</label>
                        <input type="text" id="bookTitle" required>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" id="bookAuthor">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" id="bookIsbn">
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="bookCategory"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出版社</label>
                        <input type="text" id="bookPublisher">
                    </div>
                    <div class="form-group">
                        <label>出版日期</label>
                        <input type="date" id="bookPublishDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>总册数</label>
                        <input type="number" id="bookTotalCopies" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>可借册数</label>
                        <input type="number" id="bookAvailableCopies" min="0" value="1">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">保存</button>
            </form>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
