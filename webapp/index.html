<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书借阅管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-box">
                <h1>📚 图书借阅管理系统</h1>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="login">登录</button>
                    <button class="tab-btn" data-tab="register">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form id="loginForm" class="tab-content active">
                    <div class="form-group">
                        <label>账号（12位数字）</label>
                        <input type="text" id="loginAccountId" maxlength="12" pattern="\d{12}" required placeholder="请输入12位账号">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="loginPassword" required placeholder="请输入密码">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                    <p class="link-text">
                        <a href="#" onclick="showForgotPassword()">忘记密码？</a>
                    </p>
                </form>
                
                <!-- 注册表单 -->
                <form id="registerForm" class="tab-content">
                    <div class="form-group">
                        <label>账号（12位数字）</label>
                        <input type="text" id="regAccountId" maxlength="12" pattern="\d{12}" required placeholder="请输入12位账号">
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="regUsername" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="regPassword" required placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="regConfirmPassword" required placeholder="请再次输入密码">
                    </div>
                    <div class="form-group">
                        <label>手机号（11位）</label>
                        <input type="tel" id="regPhone" maxlength="11" pattern="\d{11}" required placeholder="请输入11位手机号">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeForgotPassword()">&times;</span>
            <h2>找回密码</h2>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>账号</label>
                    <input type="text" id="fpAccountId" maxlength="12" required>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="fpUsername" required>
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="fpPhone" maxlength="11" required>
                </div>
                <div class="form-group" id="newPasswordGroup" style="display:none;">
                    <label>新密码</label>
                    <input type="password" id="fpNewPassword">
                </div>
                <button type="submit" class="btn btn-primary btn-block">验证身份</button>
            </form>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="mainPage" class="page">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <h1>📚 图书借阅管理系统</h1>
            </div>
            <div class="header-right">
                <span id="welcomeText">欢迎，用户</span>
                <button class="btn btn-outline" onclick="logout()">退出登录</button>
            </div>
        </header>

        <!-- 侧边栏 -->
        <nav class="sidebar">
            <ul class="nav-menu">
                <li class="nav-item active" data-page="books">
                    <span class="nav-icon">📖</span>
                    <span>图书查询</span>
                </li>
                <li class="nav-item" data-page="borrow">
                    <span class="nav-icon">📋</span>
                    <span>我的借阅</span>
                </li>
                <li class="nav-item" data-page="profile">
                    <span class="nav-icon">👤</span>
                    <span>个人中心</span>
                </li>
                <li class="nav-item admin-only" data-page="bookManage">
                    <span class="nav-icon">📚</span>
                    <span>图书管理</span>
                </li>
                <li class="nav-item admin-only" data-page="userManage">
                    <span class="nav-icon">👥</span>
                    <span>用户管理</span>
                </li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 图书查询页 -->
            <div id="booksPage" class="content-page active">
                <div class="page-header">
                    <h2>图书查询</h2>
                </div>
                <div class="search-bar">
                    <input type="text" id="bookSearchInput" placeholder="搜索书名或作者...">
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                    </select>
                    <button class="btn btn-primary" onclick="searchBooks()">搜索</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>书名</th>
                                <th>作者</th>
                                <th>分类</th>
                                <th>出版社</th>
                                <th>可借/总数</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 我的借阅页 -->
            <div id="borrowPage" class="content-page">
                <div class="page-header">
                    <h2>我的借阅</h2>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-borrow-tab="active">当前借阅</button>
                    <button class="tab-btn" data-borrow-tab="history">借阅历史</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>书名</th>
                                <th>借阅日期</th>
                                <th>到期日期</th>
                                <th>归还日期</th>
                                <th>状态</th>
                                <th>罚款</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="borrowTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 个人中心页 -->
            <div id="profilePage" class="content-page">
                <div class="page-header">
                    <h2>个人中心</h2>
                </div>
                <div class="profile-container">
                    <div class="profile-card">
                        <h3>基本信息</h3>
                        <form id="profileForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>账号</label>
                                    <input type="text" id="profileAccountId" readonly>
                                </div>
                                <div class="form-group">
                                    <label>用户名</label>
                                    <input type="text" id="profileUsername" readonly>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>手机号</label>
                                    <input type="tel" id="profilePhone" maxlength="11">
                                </div>
                                <div class="form-group">
                                    <label>邮箱</label>
                                    <input type="email" id="profileEmail">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>地址</label>
                                <input type="text" id="profileAddress">
                            </div>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </form>
                    </div>
                    <div class="profile-card">
                        <h3>修改密码</h3>
                        <form id="passwordForm">
                            <div class="form-group">
                                <label>原密码</label>
                                <input type="password" id="oldPassword" required>
                            </div>
                            <div class="form-group">
                                <label>新密码</label>
                                <input type="password" id="newPassword" required>
                            </div>
                            <div class="form-group">
                                <label>确认新密码</label>
                                <input type="password" id="confirmNewPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary">修改密码</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 图书管理页（管理员） -->
            <div id="bookManagePage" class="content-page">
                <div class="page-header">
                    <h2>图书管理</h2>
                    <button class="btn btn-primary" onclick="showAddBookModal()">添加图书</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>ISBN</th>
                                <th>分类</th>
                                <th>库存</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="bookManageTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 用户管理页（管理员） -->
            <div id="userManagePage" class="content-page">
                <div class="page-header">
                    <h2>用户管理</h2>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>账号</th>
                                <th>用户名</th>
                                <th>手机号</th>
                                <th>角色</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="userManageTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- 添加/编辑图书弹窗 -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeBookModal()">&times;</span>
            <h2 id="bookModalTitle">添加图书</h2>
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="form-row">
                    <div class="form-group">
                        <label>书名 *</label>
                        <input type="text" id="bookTitle" required>
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" id="bookAuthor">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>ISBN</label>
                        <input type="text" id="bookIsbn">
                    </div>
                    <div class="form-group">
                        <label>分类</label>
                        <select id="bookCategory"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出版社</label>
                        <input type="text" id="bookPublisher">
                    </div>
                    <div class="form-group">
                        <label>出版日期</label>
                        <input type="date" id="bookPublishDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>总册数</label>
                        <input type="number" id="bookTotalCopies" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>可借册数</label>
                        <input type="number" id="bookAvailableCopies" min="0" value="1">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block">保存</button>
            </form>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
